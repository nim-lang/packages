on: pull_request

jobs:
  default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: iffy/install-nim@v5.1.1
        with:
          version: stable
      - run: nim r -d:ssl -d:release combine_packages.nim prepare-old
      - run: nim r -d:ssl -d:release package_scanner.nim packages.json --old=packages_old.json --check-urls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: nim r -d:ssl -d:release combine_packages.nim check-split packages.json pkgs
